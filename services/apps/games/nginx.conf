# Use CF-Connecting-IP (real visitor IP through the CF tunnel) as rate-limit key.
# Fall back to $remote_addr for requests that arrive without the header (LAN, dev).
# Without this map, $binary_remote_addr sees only cloudflared's socket IP, so every
# request through the tunnel would share one counter — useless for per-visitor limiting.
map $http_cf_connecting_ip $adventure_limit_key {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

limit_req_zone $adventure_limit_key zone=adventure_api:10m rate=30r/m;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Launcher at root
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Study game at /study/ — React Router SPA
    location /study/ {
        root /srv/data/games;
        try_files $uri $uri/ /study/index.html =404;
    }

    # Long-term cache for hashed Vite assets under /study/
    location /study/assets/ {
        root /srv/data/games;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Adventure game (React+Vite SPA at /adventure/)
    location /adventure/ {
        root /srv/data/games;
        try_files $uri $uri/ /adventure/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Long-term cache for hashed Vite assets under /adventure/
    location /adventure/assets/ {
        root /srv/data/games;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gemini proxy — reverse proxy to adventure-proxy container
    # Strips /adventure/api/ prefix; POST /adventure/api/gemini → POST /gemini upstream
    location /adventure/api/ {
        # Rate limit to protect the Gemini API quota (30 req/min/IP, burst 10)
        limit_req zone=adventure_api burst=10 nodelay;

        proxy_pass http://adventure-proxy:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM responses can take a while
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Don't let browsers or CDNs cache AI responses
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
