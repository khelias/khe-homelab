server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Launcher at root
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Study game at /study/ — React Router SPA
    location /study/ {
        try_files $uri $uri/ /study/index.html =404;
    }

    # Long-term cache for hashed Vite assets under /study/
    location /study/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Faas 2: /adventure/ (static frontend) and /adventure/api/ (Gemini proxy)
    # will be added here once ai-adventure-engine is wired up.
}
