services:
  games:
    image: nginx:1.30-alpine@sha256:0272e4604ed93c1792f03695a033a6e8546840f86e0de20a884bb17d2c924883
    container_name: games
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./launcher:/usr/share/nginx/html:ro
      - /srv/data/games/study:/usr/share/nginx/html/study:ro
      - /srv/data/games/adventure/app:/usr/share/nginx/html/adventure:ro
    networks:
      - proxy
      - games-internal
    depends_on:
      - adventure-proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  adventure-proxy:
    # Image built by ai-adventure-engine's GitHub Actions runner on this VM
    # (see that repo's .github/workflows/deploy.yml → "Build proxy image").
    image: games-adventure-proxy:latest
    container_name: adventure-proxy
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_MODEL=gemini-2.5-flash
      - CLAUDE_MODEL=claude-sonnet-4-6
      - DEFAULT_PROVIDER=gemini
      - TZ=Europe/Tallinn
    networks:
      - games-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true
  games-internal:
    driver: bridge
