<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mängud — KHE</title>
  <meta name="description" content="Elias'te pere mängukogu">
  <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 300;
      font-display: swap;
      src: url('/fonts/inter-300.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/fonts/inter-400.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('/fonts/inter-500.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url('/fonts/inter-600.woff2') format('woff2');
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #09090b;
      --text: #fafafa;
      --text-dim: #a1a1aa;
      --text-muted: #71717a;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.18);
      --card-bg: rgba(255, 255, 255, 0.02);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding: 4rem 1.5rem 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* subtle background glow */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 60%;
      background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.08), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header { margin-bottom: 3rem; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 400;
      margin-bottom: 2rem;
      transition: color 0.15s, gap 0.15s;
    }
    .back-link:hover { color: var(--text); gap: 0.5rem; }
    .back-link svg { width: 14px; height: 14px; }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 300;
    }

    main {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .game-card {
      position: relative;
      padding: 1.75rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 0.2s,
                  background 0.25s;
      backdrop-filter: blur(6px);
    }

    /* color wash overlay on hover */
    .game-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--card-accent);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    .game-card:hover {
      transform: translateY(-3px);
      border-color: var(--border-hover);
    }
    .game-card:hover::after { opacity: 0.25; }

    .game-card > * { position: relative; z-index: 1; }

    .game-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--card-accent);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      box-shadow: 0 4px 12px -2px var(--card-shadow, rgba(0,0,0,0.3));
    }
    .game-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .game-title {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.015em;
      margin-bottom: 0.375rem;
    }

    .game-desc {
      color: var(--text-dim);
      font-size: 0.875rem;
      line-height: 1.55;
      flex: 1;
      margin-bottom: 1.25rem;
    }

    .game-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      color: var(--text-dim);
      font-size: 0.8rem;
      font-weight: 500;
      transition: color 0.15s, gap 0.15s;
    }
    .game-card:hover .game-cta { color: var(--text); gap: 0.5rem; }
    .game-cta svg { width: 14px; height: 14px; }

    /* Coming soon placeholder card (disabled) */
    .game-card.soon {
      cursor: default;
      opacity: 0.6;
    }
    .game-card.soon:hover {
      transform: none;
      border-color: var(--border);
    }
    .game-card.soon:hover::after { opacity: 0; }
    .game-card.soon .game-cta { color: var(--text-muted); }

    footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* per-card accents */
    .card-study {
      --card-accent: linear-gradient(135deg, #10b981, #0ea5e9);
      --card-shadow: rgba(16, 185, 129, 0.25);
    }
    .card-adventure {
      --card-accent: linear-gradient(135deg, #a855f7, #ec4899);
      --card-shadow: rgba(168, 85, 247, 0.25);
    }

    @media (max-width: 480px) {
      body { padding: 2.5rem 1rem 1.5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="https://khe.ee" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        khe.ee
      </a>
      <h1>Mängud</h1>
      <p class="subtitle">Elias'te pere mängukogu</p>
    </header>

    <main>
      <a href="/study/" class="game-card card-study">
        <div class="game-icon">
          <svg viewBox="0 0 24 24"><path d="M4 19.5v-15A2.5 2.5 0 016.5 2H20v20H6.5a2.5 2.5 0 010-5H20"/><path d="M9 7h6M9 11h4"/></svg>
        </div>
        <div class="game-title">Nutimängud</div>
        <p class="game-desc">Lugemine, matemaatika ja loogika läbi lõbusate ülesannete. Lastele ja kogu perele.</p>
        <span class="game-cta">
          Mängi
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </a>

      <a href="/adventure/" class="game-card card-adventure">
        <div class="game-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2l2.6 5.3 5.9.8-4.3 4.1 1 5.8L12 15.3l-5.2 2.7 1-5.8L3.5 8.1l5.9-.8L12 2z"/></svg>
        </div>
        <div class="game-title">AI Seiklus</div>
        <p class="game-desc">AI-juhitud grupiseiklus eesti keeles. Valid žanri, loo genereerib ise ja kõik mängivad koos.</p>
        <span class="game-cta">
          Mängi
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </a>
    </main>

    <footer>Self-hosted in Tallinn</footer>
  </div>
</body>
</html>
