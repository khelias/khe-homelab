services:
  study-game:
    image: nginx:1.28-alpine
    container_name: study-game
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/data/study-game/dist:/usr/share/nginx/html:ro
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy:
    external: true
