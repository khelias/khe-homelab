<!DOCTYPE html>
<html lang="en">
<head>

  <title>Kaido Henrik Elias</title>
  <meta name="description" content="Software architect — projects and links">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #09090b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    /* Monogram */
    .monogram {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #a1a1aa;
      margin-bottom: 1.75rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 0.375rem;
    }

    .tagline {
      color: #71717a;
      font-size: 0.875rem;
      font-weight: 300;
      margin-bottom: 2.25rem;
    }

    /* Links */
    nav {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: transparent;
      color: #d4d4d8;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      transition: all 0.15s;
    }

    nav a:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: #fafafa;
    }

    nav svg {
      width: 14px;
      height: 14px;
      opacity: 0.6;
    }

    nav a:hover svg {
      opacity: 1;
    }

    footer {
      color: #3f3f46;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      nav { flex-direction: column; align-items: center; }
    }
  </style>
</head>
