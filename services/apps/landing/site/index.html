<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KHE</title>
  <meta name="description" content="Kaido Henrik Elias — projects and links">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0b;
      --surface: #141416;
      --border: #232328;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #a78bfa;
      --accent-dim: rgba(167, 139, 250, 0.08);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle background glow */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      padding: 0 1.5rem;
      margin-top: min(20vh, 160px);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    /* Sections */
    section {
      margin-bottom: 3rem;
    }

    section h2 {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      padding-left: 0.125rem;
    }

    /* Project cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.25rem;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 0.125rem;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .card-arrow {
      color: var(--text-muted);
      transition: color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    .card:hover .card-arrow {
      color: var(--accent);
      transform: translateX(2px);
    }

    /* Social links row */
    .links {
      display: flex;
      gap: 0.75rem;
    }

    .links a {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s;
    }

    .links a:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .links svg {
      width: 18px;
      height: 18px;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 1.5rem 2rem;
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* Mobile */
    @media (max-width: 480px) {
      main { margin-top: 12vh; }
      .header h1 { font-size: 2rem; }
      .links { flex-direction: column; }
    }
  </style>
</head>
<body>

<main>
  <header class="header">
    <h1>Kaido Henrik Elias</h1>
    <p>Software architect by trade. Tinkerer by nature.</p>
  </header>

  <section>
    <h2>Projects</h2>
    <div class="cards">
      <a href="https://games.khe.ee" class="card">
        <div class="card-icon">&#127891;</div>
        <div class="card-body">
          <div class="card-title">Study Game</div>
          <div class="card-desc">Interactive learning app for kids</div>
        </div>
        <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
  </section>

  <section>
    <h2>Links</h2>
    <div class="links">

      <a href="https://www.linkedin.com/in/kaido-henrik-elias/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

  </section>
</main>

<footer>
  Self-hosted on a homelab in Tallinn
</footer>

</body>
</html>
