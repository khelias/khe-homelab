services:
  landing:
    image: nginx:1.31-alpine@sha256:20316569d8f81a160065d7d2a5eeffc7ca97d79022462ee255fd23fa103a6b5c
    container_name: landing
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/data/sites/khe:/usr/share/nginx/html:ro
      - ${HOMELAB_REPORTS_HOST_DIR:-/srv/data/reports/khe}/public:/usr/share/nginx/reports:ro
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

networks:
  proxy:
    external: true
