server {
    listen 80;
    root /usr/share/nginx/html;

    # Protect the OTHER khe.ee origins from anything published here. Deliberately
    # no strict app CSP: these pages carry user-authored inline scripts and a
    # default-src lockdown would break them. frame-ancestors stops clickjacking;
    # the rest are origin-wide and safe.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=()" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    # Ad-hoc pages must never be indexed; the header is authoritative for crawlers.
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # Always 200 regardless of content: keeps crawlers out and gives the
    # healthcheck a stable target even before any page is published.
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Clean URLs: /leht1 serves leht1.html; real directories serve index.html;
    # everything else is a real 404 (no catch-all that would mask typos).
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
