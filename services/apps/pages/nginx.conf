# Mounted as the MAIN /etc/nginx/nginx.conf (not conf.d) so we can set the worker
# user. FileBrowser ('draft') hardcodes newly created files to mode 0640 (owner +
# group read, NO other-read) regardless of umask, so the stock 'nginx' worker
# (uid 101) gets 403 Forbidden on every published page. Workers run as root to
# read them. Safe here: this container is a read-only static server that mounts
# nothing but the public page tree and this config - no proxying, no exec, no
# secrets to leak.
user  root;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    # Forgiving default so an extension-less file (e.g. a page saved as "unify")
    # renders as a page instead of downloading as application/octet-stream.
    default_type  text/html;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        root /usr/share/nginx/html;

        # Protect the OTHER khe.ee origins from anything published here. No strict
        # app CSP: these pages carry user-authored inline scripts a default-src
        # lockdown would break. frame-ancestors stops clickjacking; rest are origin-wide.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=()" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        # Ad-hoc pages must never be indexed; the header is authoritative for crawlers.
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

        # Always 200 regardless of content: keeps crawlers out and gives the
        # healthcheck a stable target even before any page is published.
        location = /robots.txt {
            default_type text/plain;
            return 200 "User-agent: *\nDisallow: /\n";
        }

        # Clean URLs: /leht1 serves leht1.html (or a file literally named leht1);
        # real directories serve index.html; everything else is a real 404.
        location / {
            try_files $uri $uri.html $uri/ =404;
        }
    }
}
