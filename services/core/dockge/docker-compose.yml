services:
  dockge-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: dockge-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Dockge manages Compose stacks, so it needs explicit container/image/
      # network/volume write access. Keep unrelated Docker API areas closed.
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      BUILD: 1
      EVENTS: 1
      INFO: 1
      PING: 1
      VERSION: 1
      POST: 1
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      TASKS: 0
      CONFIGS: 0
      SYSTEM: 0
      EXEC: 0
      LOG_LEVEL: warning
    networks:
      - dockge-socket
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:2375/_ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  dockge:
    image: louislam/dockge:1.5.0@sha256:335c6368b880ecc203236ed89e6e5232e0d6578e8ef5920e4a502390451502bf
    container_name: dockge
    restart: unless-stopped
    depends_on:
      dockge-socket-proxy:
        condition: service_healthy
    ports:
      - "5001:5001"
    volumes:
      - dockge_data:/app/data
      - /srv/dockge/stacks:/srv/dockge/stacks
    environment:
      - DOCKGE_STACKS_DIR=/srv/dockge/stacks
      - DOCKER_HOST=tcp://dockge-socket-proxy:2375
      - TZ=Europe/Tallinn
    networks:
      - dockge-socket
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'

volumes:
  dockge_data:

networks:
  dockge-socket:
    driver: bridge
    internal: true
