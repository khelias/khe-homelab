# AdGuard Home baseline config — checked into git without any credentials.
#
# On first deploy, copy this file to AdGuardHome.yaml (which is gitignored)
# so the live file can hold admin user + runtime state outside of version control:
#
#   cp AdGuardHome.template.yaml AdGuardHome.yaml
#   docker compose up -d adguard       # wizard creates admin on first visit
#
# AdGuard rewrites AdGuardHome.yaml at runtime (users, stats, filters); keeping
# it tracked would leak credential hashes and create constant git diff noise.
http:
  pprof:
    port: 6060
    enabled: false
  address: 0.0.0.0:80
  session_ttl: 720h
dns:
  port: 53
  bind_hosts:
    - 0.0.0.0
  # Cloudflare DoH + DNS4EU Protective DoH. Quad9 was dropped 2026-05-05
  # after AdGuardHome#8014 — Quad9 DoH endpoint drops connections with
  # "unexpected EOF" intermittently from this network (likely PPPoE MTU
  # interaction), no upstream fix. DNS4EU is the EU's official replacement
  # for the now-discontinued dns0.eu, run by Whalebone consortium under
  # the European Commission, EU-hosted, GDPR-by-design, malware filtering.
  upstream_dns:
    - https://dns.cloudflare.com/dns-query
    - https://protective.joindns4.eu/dns-query
  # Parallel: query both upstreams simultaneously, use first response.
  # AdGuard's official recommendation when upstreams may be unstable.
  # Trades ~50 bytes/query bandwidth for resilience against any single
  # upstream failing — the EOF-style intermittent drops we hit on Quad9
  # become invisible to clients because Cloudflare answers first.
  upstream_mode: parallel
  # Plain DNS fallback to two different operators if both DoH upstreams
  # fail. Quad9 plain (53/udp) is fine — only Quad9 *DoH* has the EOF
  # problem. Cloudflare's secondary anycast IP for redundancy.
  fallback_dns:
    - 9.9.9.9
    - 1.0.0.1
  bootstrap_dns:
    - 9.9.9.9
    - 149.112.112.112
    - 1.1.1.1
  protection_enabled: true
  filtering_enabled: true
  blocking_mode: default
  blocked_response_ttl: 10
  # Per-subnet DNS ratelimit. Bumped from 20 -> 100 so browser preconnect
  # bursts (many tabs, Safari/Chrome prefetch, iOS background apps) aren't
  # throttled. AdGuard's ratelimit_whitelist only accepts bare IPs (no CIDR),
  # so a plain higher limit is the right knob for a trusted LAN.
  ratelimit: 100
  enable_dnssec: true
  cache_size: 4194304
  cache_ttl_min: 300
  cache_ttl_max: 86400
  cache_optimistic: true
filtering:
  rewrites:
    # openclaw.khe.ee and games.khe.ee intentionally omitted — resolve via Cloudflare (CF Access / HTTPS needed)
    # n8n.khe.ee omitted — CF Access OTP protection must apply on LAN too
    - domain: khe.ee
      answer: 192.168.0.11
    - domain: dash.khe.ee
      answer: 192.168.0.11
    - domain: cloud.khe.ee
      answer: 192.168.0.11
    - domain: vault.khe.ee
      answer: 192.168.0.11
    - domain: docs.khe.ee
      answer: 192.168.0.11
    - domain: photos.khe.ee
      answer: 192.168.0.11
    - domain: jellyfin.khe.ee
      answer: 192.168.0.11
    - domain: books.khe.ee
      answer: 192.168.0.11
    - domain: status.khe.ee
      answer: 192.168.0.11
  # AdGuard's built-in Safe Browsing — hits Google/Mozilla reputation DB for
  # malware + phishing domains. Complements the Hagezi TIF blocklist below
  # (reputation lookup catches zero-day phish, TIF catches known-bad domains).
  # NB: AdGuard's own key is `safebrowsing_enabled` (one word, no underscore).
  safebrowsing_enabled: true
  parental_enabled: false
filters:
  # AdGuard DNS filter — baseline ads + trackers, low false positives.
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
    name: AdGuard DNS filter
    id: 1
  # OISD big: comprehensive community-maintained ad/tracker domain list,
  # wider coverage than OISD small including regional ad networks.
  - enabled: true
    url: https://big.oisd.nl
    name: OISD big
    id: 100
  # Hagezi Pro Plus: actively maintained, strong privacy coverage incl. EU
  # trackers (Cxense, Piano, Gemius, Adform) that Delfi/Postimees/ERR use.
  # Balanced tier — blocks ads+trackers without breaking common services.
  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/pro.plus.txt
    name: Hagezi Pro Plus
    id: 101
  # Hagezi Threat Intelligence Feed: malware + phishing domains. Paired with
  # AdGuard Safe Browsing for layered defence (reputation DB + static list).
  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/tif.txt
    name: Hagezi Threat Intelligence Feed
    id: 102
# Custom overrides — trackers that bypass the upstream lists.
#   connect.facebook.net: Facebook Pixel (not covered by Hagezi Pro Plus).
#   cxswyjy.com:          Creality printer Chinese telemetry ("devdata"),
#                         not in any generic list. crealitycloud.com is left
#                         alone so the Creality Cloud app keeps working.
user_rules:
  - '||connect.facebook.net^'
  - '||cxswyjy.com^'
querylog:
  enabled: true
  interval: 168h
  size_memory: 1000
statistics:
  enabled: true
  interval: 168h
schema_version: 34
