services:
  adguard:
    image: adguard/adguardhome:v0.107.77@sha256:e6f2b8bcda06064ab055b44933a4f0e983c35558b9cdb8d2e7ab1efcee36d890
    container_name: adguard
    restart: unless-stopped
    environment:
      - TZ=Europe/Tallinn
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80"      # Admin UI
    volumes:
      - ./config:/opt/adguardhome/conf
      - adguard_work:/opt/adguardhome/work
    networks:
      - proxy
    deploy:
      resources:
        limits:
          memory: 1G  # 512M caused 2-4 OOM-kills/day with OISD big (330k rules) + Hagezi Pro Plus (245k rules); each kill = ~10s DNS outage
          cpus: '0.50'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  adguard_work:

networks:
  proxy:
    external: true
