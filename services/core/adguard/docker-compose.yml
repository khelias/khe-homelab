services:
  adguard:
    image: adguard/adguardhome:v0.107.73
    container_name: adguard
    restart: unless-stopped
    environment:
      - TZ=Europe/Tallinn
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80"      # Admin UI
    volumes:
      - ./config:/opt/adguardhome/conf
      - adguard_work:/opt/adguardhome/work
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  adguard_work:

networks:
  proxy:
    external: true
