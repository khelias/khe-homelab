services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.3.0@sha256:a8e5e69ce185d5425fcbf2ab14ddf808df5651fb2747a46a17cecf8ed5fd1af2
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - TZ=Europe/Tallinn
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "node", "/app/extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'

volumes:
  uptime_kuma_data:

networks:
  proxy:
    external: true
