services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0@sha256:91e963bfda569ba115206e843febb446f473ab525add4e08b2b9e3beffa16985
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - TZ=Europe/Tallinn
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - proxy
      - observability
    healthcheck:
      test: ["CMD", "node", "/app/extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'

volumes:
  uptime_kuma_data:

networks:
  proxy:
    external: true
  observability:
    external: true
