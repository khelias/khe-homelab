services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.12.3@sha256:cc84f2f5eb3c7734353701ccbaa24ed02dacb0d119114e50e4251e2005f3990a
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv:/srv:ro
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_DOMAIN}
      - TZ=Europe/Tallinn
      # AdGuard Home
      - HOMEPAGE_VAR_ADGUARD_USERNAME=${ADGUARD_USERNAME}
      - HOMEPAGE_VAR_ADGUARD_PASSWORD=${ADGUARD_PASSWORD}
      # Immich
      - HOMEPAGE_VAR_IMMICH_API_KEY=${IMMICH_API_KEY}
      # Jellyfin
      - HOMEPAGE_VAR_JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      # Audiobookshelf
      - HOMEPAGE_VAR_AUDIOBOOKSHELF_API_KEY=${AUDIOBOOKSHELF_API_KEY}
      # Paperless-ngx
      - HOMEPAGE_VAR_PAPERLESS_API_KEY=${PAPERLESS_API_KEY}
      # Nextcloud
      - HOMEPAGE_VAR_NEXTCLOUD_USERNAME=${NEXTCLOUD_ADMIN_USER}
      - HOMEPAGE_VAR_NEXTCLOUD_APP_PASSWORD=${NEXTCLOUD_APP_PASSWORD}
      # n8n
      - HOMEPAGE_VAR_N8N_API_KEY=${N8N_API_KEY}
      # Proxmox
      - HOMEPAGE_VAR_PROXMOX_TOKEN_ID=${PROXMOX_TOKEN_ID}
      - HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET=${PROXMOX_TOKEN_SECRET}
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'

networks:
  proxy:
    external: true
