- Pilv:
    - Nextcloud:
        icon: nextcloud
        href: https://cloud.khe.ee
        description: Failid, kalender, kontaktid
        server: my-docker
        container: nextcloud
        widget:
          type: nextcloud
          url: http://nextcloud:80
          username: "{{HOMEPAGE_VAR_NEXTCLOUD_USERNAME}}"
          password: "{{HOMEPAGE_VAR_NEXTCLOUD_APP_PASSWORD}}"
    - Vaultwarden:
        icon: vaultwarden
        href: https://vault.khe.ee
        description: Paroolihaldur
        server: my-docker
        container: vaultwarden
    - Paperless-ngx:
        icon: paperless-ngx
        href: https://docs.khe.ee
        description: Dokumendiarhiiv
        server: my-docker
        container: paperless
        widget:
          type: paperlessngx
          url: http://paperless:8000
          key: "{{HOMEPAGE_VAR_PAPERLESS_API_KEY}}"

- Meedia:
    - Immich:
        icon: immich
        href: https://photos.khe.ee
        description: Fotod ja videod
        server: my-docker
        container: immich-server
        widget:
          type: immich
          url: http://immich-server:2283
          key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
          version: 2
    - Jellyfin:
        icon: jellyfin
        href: https://jellyfin.khe.ee
        description: Filmid ja multikad
        server: my-docker
        container: jellyfin
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
          enableUser: true
          showEpisodeNumber: true
    - Audiobookshelf:
        icon: audiobookshelf
        href: https://books.khe.ee
        description: Audioraamatud
        server: my-docker
        container: audiobookshelf
        widget:
          type: audiobookshelf
          url: http://audiobookshelf:80
          key: "{{HOMEPAGE_VAR_AUDIOBOOKSHELF_API_KEY}}"

- AI:
    - n8n:
        icon: n8n
        href: https://n8n.khe.ee
        description: Automatsioonid
        server: my-docker
        container: n8n
    - Ollama:
        icon: ollama
        description: Lokaalne AI
        server: my-docker
        container: ollama

- Virtualisatsioon:
    - Proxmox:
        icon: proxmox
        href: https://192.168.0.10:8006
        description: Hypervisor (pve.khe.ee)
        widget:
          type: proxmox
          url: https://192.168.0.10:8006
          username: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_ID}}"
          password: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET}}"
          node: pve
          allowInsecure: true
          fields: ["vms", "lxc", "resources.cpu", "resources.mem"]
    - Docker VM:
        icon: docker
        href: http://192.168.0.11:5001
        description: VM 100 · 192.168.0.11

- Haldus:
    - Uptime Kuma:
        icon: uptime-kuma
        href: https://status.khe.ee
        description: Monitooring
        server: my-docker
        container: uptime-kuma
    - Dockge:
        icon: dockge
        href: http://192.168.0.11:5001
        description: Docker haldus
        server: my-docker
        container: dockge
    - AdGuard:
        icon: adguard-home
        href: http://192.168.0.11:8080
        description: DNS ja reklaamiblokeerija
        server: my-docker
        container: adguard
        widget:
          type: adguard
          url: http://adguard:80
          username: "{{HOMEPAGE_VAR_ADGUARD_USERNAME}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASSWORD}}"
