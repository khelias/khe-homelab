services:
  # Hardened socket proxy in front of Docker's API — Alloy needs
  # GET /containers (list + inspect) and GET /containers/{id}/logs to
  # do native Docker log shipping with per-container metadata.
  # Same pattern as services/core/autoheal/, just a separate proxy
  # so the two consumers don't share trust boundaries.
  alloy-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: alloy-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1      # GET /containers/* (list, inspect, logs)
      NETWORKS: 1        # discovery.docker resolves __meta_docker_network_* labels
      IMAGES: 1          # __meta_docker_container_image label resolution
      POST: 0            # No writes of any kind (all reads above remain read-only)
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      TASKS: 0
      CONFIGS: 0
      VOLUMES: 0
      INFO: 0
      LOG_LEVEL: warning
    networks:
      - alloy-socket
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:2375/_ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Grafana Alloy — OpenTelemetry Collector distribution with native
  # Docker discovery. Replaces the v1 OTel Collector filelog approach;
  # ships logs straight to Loki via the native push API with
  # container_name as a first-class stream label.
  alloy:
    image: grafana/alloy:v1.16.2@sha256:32913cbfac652d15fa84d256a74e5ee3f71575961bb19d34796ce3838bfba693
    container_name: alloy
    restart: unless-stopped
    depends_on:
      alloy-socket-proxy:
        condition: service_healthy
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    environment:
      - TZ=Europe/Tallinn
    volumes:
      - ./config/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
    networks:
      - observability
      - alloy-socket
    # No container-internal healthcheck: grafana/alloy ships without
    # wget/curl, and adding a thin Dockerfile layer just for a probe
    # breaks the "pinned upstream image" convention. Liveness comes from
    # restart: unless-stopped + the external Uptime Kuma monitor against
    # http://alloy:12345/-/ready on the observability network.
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'

volumes:
  alloy_data:

networks:
  observability:
    external: true
  alloy-socket:
    driver: bridge
    internal: true  # No external access — only alloy <-> socket-proxy
