services:
  # OTel Collector (contrib) — single agent collecting logs from every Docker
  # container via the host's JSON log files. Container ID is derived from the
  # file path. Container-name enrichment (via docker_observer extension + a
  # socket proxy à la autoheal) is a v2 follow-up; v1 keeps the surface
  # minimal — 12-char container ID is the visible label.
  #
  # Reading /var/lib/docker/containers requires the bind below to be :ro and
  # the Collector to run as root inside the container (the json log files are
  # owned by root on the host). No Docker socket access in v1.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0@sha256:789689988e379c58ac12b07718dbcf4b23c2214bd804173c1c77af346d381c15
    container_name: otel-collector
    restart: unless-stopped
    # Root inside the container so the filelog receiver can read Docker's
    # per-container JSON log files (root:root, mode 0700 on the host).
    # The bind mount below is :ro, so this widens read scope only, not write.
    user: "0:0"
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      - TZ=Europe/Tallinn
    volumes:
      - ./config/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - otel_storage:/var/lib/otelcol
    networks:
      - observability
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'

volumes:
  otel_storage:

networks:
  observability:
    external: true
