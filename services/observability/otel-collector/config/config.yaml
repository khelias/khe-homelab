# OTel Collector — log shipper for every Docker container on this host.
#
# Approach: read the JSON log files Docker writes per-container at
# /var/lib/docker/containers/<id>/<id>-json.log. The container ID is
# extracted from the path; container name enrichment via the Docker API
# is a v2 step (needs a hardened socket proxy à la autoheal).
receivers:
  filelog:
    include:
      - /var/lib/docker/containers/*/*-json.log
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      # Docker writes one JSON object per line: { log, stream, time }
      - type: json_parser
        timestamp:
          parse_from: attributes.time
          layout: '%Y-%m-%dT%H:%M:%S.%LZ'
        severity:
          parse_from: attributes.stream
          mapping:
            error: stderr
            info: stdout
      # Pull the 64-char container ID out of the path; keep the short
      # 12-char prefix as the visible label (matches `docker ps` output).
      - type: regex_parser
        parse_from: attributes["log.file.path"]
        regex: '^/var/lib/docker/containers/(?P<container_id>[a-f0-9]{12})[a-f0-9]+/.*-json\.log$'
      # The actual log message lives in attributes.log — promote it to body.
      - type: move
        from: attributes.log
        to: body
      # Promote container_id straight into the resource scope (the `resource`
      # processor can't copy from log-level attributes, so we do it here).
      # Loki only indexes RESOURCE attributes as stream labels — without this
      # move, container_id lands as structured metadata and can't be filtered
      # via `{container_id="..."}` queries.
      - type: move
        from: attributes.container_id
        to: resource["container_id"]
      # Drop noise attributes that we either already consumed or don't need.
      - type: remove
        field: attributes.time
      - type: remove
        field: attributes.stream
      - type: remove
        field: attributes["log.file.path"]

processors:
  # Static resource attributes: cluster (multi-host future-proofing) and
  # service.namespace (groups all homelab logs under one logical service).
  resource:
    attributes:
      - key: cluster
        value: homelab
        action: insert
      - key: service.namespace
        value: khe-homelab
        action: insert

  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Cap memory before the runtime OOM-kills us.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [filelog]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/loki]
  telemetry:
    metrics:
      level: basic
    logs:
      level: info
