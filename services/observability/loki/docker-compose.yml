services:
  # Loki — log aggregation backend. OTLP receiver on /otlp endpoint.
  # Single-binary mode (no microservices split). Filesystem storage on
  # bulk ZFS at /srv/data/loki. Built-in ruler fires alerts to Alertmanager.
  #
  # This stack owns the `observability` network; deploy this before
  # grafana, otel-collector, or alertmanager (DEPLOY_ORDER handles that).
  loki:
    image: grafana/loki:3.7.1@sha256:1694e9237e2b3d7cd4ad959bae1f21e12b6184d886d7412bd1b939fb0dd4e75c
    container_name: loki
    restart: unless-stopped
    user: "10001:10001"
    command: -config.file=/etc/loki/local-config.yaml
    environment:
      - TZ=Europe/Tallinn
    volumes:
      - ./config/config.yaml:/etc/loki/local-config.yaml:ro
      - ./config/rules:/loki-rules:ro
      - /srv/data/loki:/loki
    networks:
      - observability
    # No container-internal healthcheck: grafana/loki >= 3.7 is fully
    # distroless (no shell, no wget/curl), and adding a thin Dockerfile
    # layer just for a probe breaks the "pinned upstream image"
    # convention — same call as services/observability/alloy. Liveness
    # comes from restart: unless-stopped + the external Uptime Kuma
    # monitor against http://loki:3100/ready on the observability
    # network. See docs/operational-notes.md > Healthchecks.
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.00'

networks:
  observability:
    name: observability
    driver: bridge
