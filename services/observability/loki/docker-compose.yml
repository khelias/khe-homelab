services:
  # Loki — log aggregation backend. OTLP receiver on /otlp endpoint.
  # Single-binary mode (no microservices split). Filesystem storage on
  # bulk ZFS at /srv/data/loki. Built-in ruler fires alerts to Alertmanager.
  #
  # This stack owns the `observability` network; deploy this before
  # grafana, otel-collector, or alertmanager (DEPLOY_ORDER handles that).
  loki:
    image: grafana/loki:3.5.0@sha256:4c431d2e6b9b38718694b31c5d56be7c80dc69c513215fde1aeb5b02cd4e2665
    container_name: loki
    restart: unless-stopped
    user: "10001:10001"
    command: -config.file=/etc/loki/local-config.yaml
    environment:
      - TZ=Europe/Tallinn
    volumes:
      - ./config/config.yaml:/etc/loki/local-config.yaml:ro
      - ./config/rules:/loki-rules:ro
      - /srv/data/loki:/loki
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready | grep -q 'ready'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.00'

networks:
  observability:
    name: observability
    driver: bridge
