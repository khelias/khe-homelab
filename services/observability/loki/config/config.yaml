# Loki single-binary configuration. Filesystem storage on bulk ZFS,
# 30-day retention enforced via compactor. OTLP receiver is enabled
# by default on /otlp; OTel Collector posts here.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  # warn drops the ~95% info-level routine chatter (push.go per-batch
  # receipts, metrics.go per-query, ruler eval, compactor cycle,
  # index/table maintenance) that otherwise makes container=loki the
  # single noisiest log stream by an order of magnitude. Operational
  # signal (slow queries, dropped batches, retention errors) is at
  # warn or above and still surfaces. Bump back to info temporarily
  # for query-attribution debugging.
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_query_lookback: 720h
  allow_structured_metadata: true
  volume_enabled: true
  reject_old_samples: true
  # Match retention_period so Alloy's initial Docker log tail (reads each
  # container's history from file start) is not rejected when containers
  # have been running longer than 7d. Anything inside the 30d retention
  # window is acceptable to ingest.
  reject_old_samples_max_age: 720h

  # OTLP attribute → Loki stream label mapping. Defaults promote only
  # service.name / service.namespace. Docker container logs come via
  # Alloy's native push API (not OTLP) with container_name set
  # explicitly, so we don't add Docker labels here. This block is
  # kept for the future khe-study OTLP path: when app-level traces
  # and logs arrive over OTLP, "cluster" is the one extra label we
  # want indexed across signals.
  otlp_config:
    resource_attributes:
      attributes_config:
        - action: index_label
          attributes:
            - cluster

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  compaction_interval: 10m

# Loki's built-in ruler loads alert/recording rules from disk and
# pushes firing alerts to Alertmanager.
ruler:
  alertmanager_url: http://alertmanager:9093
  enable_alertmanager_v2: true
  evaluation_interval: 1m
  poll_interval: 1m
  storage:
    type: local
    local:
      directory: /loki-rules
  rule_path: /loki/rules-tmp
  ring:
    kvstore:
      store: inmemory


analytics:
  reporting_enabled: false
