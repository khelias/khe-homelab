# Loki single-binary configuration. Filesystem storage on bulk ZFS,
# 30-day retention enforced via compactor. OTLP receiver is enabled
# by default on /otlp; OTel Collector posts here.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_query_lookback: 720h
  allow_structured_metadata: true
  volume_enabled: true
  reject_old_samples: true
  reject_old_samples_max_age: 168h

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  compaction_interval: 10m

# Loki's built-in ruler loads alert/recording rules from disk and
# pushes firing alerts to Alertmanager.
ruler:
  alertmanager_url: http://alertmanager:9093
  enable_alertmanager_v2: true
  evaluation_interval: 1m
  poll_interval: 1m
  storage:
    type: local
    local:
      directory: /loki-rules
  rule_path: /loki/rules-tmp
  ring:
    kvstore:
      store: inmemory

# OTLP ingest. Resource attributes listed here become indexed stream labels;
# everything else lands as structured metadata (queryable, not indexed).
distributor:
  otlp_config:
    default_resource_attributes_as_index_labels:
      - service.name
      - service.namespace
      - container_name
      - cluster

analytics:
  reporting_enabled: false
