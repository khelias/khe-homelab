# Loki ruler alert rules. With auth_enabled=false in Loki, the tenant
# directory is literally "fake" — that's the convention, not a typo.
#
# Add new groups as the homelab grows. Keep alerts noise-free: a rule
# that fires on a daily cron's expected stderr is worse than no rule.
groups:
  - name: adventure-proxy
    interval: 1m
    rules:
      - alert: AdventureProxyErrorBurst
        expr: |
          sum by (container_name) (
            count_over_time({container_name="adventure-proxy"} |= "ERROR" [5m])
          ) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "adventure-proxy logged >3 ERROR lines in 5 minutes"

  - name: containers
    interval: 1m
    rules:
      # Anything that crashes hard tends to emit "panic", "fatal", or
      # "OOMKilled" near the end. Cast a wide net here, narrow later.
      #
      # container_name!="loki" avoids a self-reference loop: Loki logs
      # every executed query (ruler eval, querier, frontend, engine) at
      # info level *including the query string itself*, which contains
      # this regex literally. Alloy ships Loki's own logs back into
      # Loki, the regex matches its own echo, the alert fires for
      # container=loki indefinitely, and ad-hoc Explore queries against
      # the rule's metric perpetuate the loop. Loki's actual liveness
      # is covered by the Uptime Kuma probe against http://loki:3100
      # /ready, which is the right tool for "service is up" anyway.
      - alert: ContainerHardCrash
        expr: |
          sum by (container_name) (
            count_over_time(
              {cluster="homelab", container_name!="loki"}
                |~ "(?i)panic|fatal error|oom[- ]?killed"
              [5m]
            )
          ) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "container {{ $labels.container_name }} emitted panic/fatal/OOM"
