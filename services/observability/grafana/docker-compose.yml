services:
  # Grafana — UI for Loki + Alertmanager. LAN-only ingress via NPM for v1;
  # add to Cloudflare Tunnel with CF Access OTP before exposing externally.
  # Loki datasource is auto-provisioned from config/provisioning/.
  grafana:
    image: grafana/grafana:13.0.2@sha256:b8f6abae513b839b2f3487343fa5e44d9c9d7871271fdd17689c4c452cb8098e
    container_name: grafana
    restart: unless-stopped
    ports:
      # Direct LAN/Tailscale access before NPM is wired up. NPM ingress
      # still reaches us via the `proxy` network on container port 3000.
      # Port 3000 on host is taken by homepage — using 3030 here.
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_INSTALL_PLUGINS=
      - TZ=Europe/Tallinn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/provisioning:/etc/grafana/provisioning:ro
    networks:
      - proxy
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'

volumes:
  grafana_data:

networks:
  proxy:
    external: true
  observability:
    external: true
