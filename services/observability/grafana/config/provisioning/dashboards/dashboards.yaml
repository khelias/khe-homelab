# Dashboard provider — loads any JSON dashboard from
# /etc/grafana/provisioning/dashboards/files/ (bind-mounted read-only).
# Picked up at startup and re-scanned every updateIntervalSeconds.
apiVersion: 1

providers:
  - name: homelab
    orgId: 1
    folder: Homelab
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards/files
      foldersFromFilesStructure: false
