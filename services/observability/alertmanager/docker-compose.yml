services:
  # Alertmanager — receives alerts from Loki ruler, fans out to Telegram.
  # Live alertmanager.yml is .gitignored (contains the bot token); start
  # from alertmanager.yml.example and fill in token + chat ID (the same
  # bot Uptime Kuma uses — copy values from Uptime Kuma → Settings →
  # Notifications).
  alertmanager:
    image: prom/alertmanager:v0.33.0@sha256:2e39a6678c8895b1fc5e304e0cd9b45dc30713c51882c70bf4e0e266763c8b82
    container_name: alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --log.level=info
    environment:
      - TZ=Europe/Tallinn
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9093/-/ready | grep -q OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

volumes:
  alertmanager_data:

networks:
  observability:
    external: true
