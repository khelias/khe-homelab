services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.2.26
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    environment:
      - TZ=Europe/Tallinn
    networks:
      - proxy
      - ai-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    # NOTE: Run onboarding before first start:
    #   docker compose run --rm openclaw onboard
    # This configures API keys and chat platform connections.
    # After onboarding, start normally:
    #   docker compose up -d

volumes:
  openclaw_config:
  openclaw_workspace:

networks:
  proxy:
    external: true
  ai-internal:
    external: true
