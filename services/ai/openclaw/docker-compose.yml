services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: openclaw-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Read-only Docker API access
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      VOLUMES: 1
      # Write operations: blocked except container restart/stop/start
      POST: 0
      ALLOW_RESTARTS: 1
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      TASKS: 0
      CONFIGS: 0
    networks:
      - socket-proxy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  openclaw:
    # NOTE: bonjour (mDNS) plugin is denied in openclaw.json (in openclaw_config volume) —
    # CIAO probing fails on bridge networks and crashes the gateway in a loop. If the volume
    # is recreated, re-apply: `openclaw config set plugins.deny '["bonjour"]' --strict-json`
    # (or edit openclaw.json directly). mDNS isn't useful here: access is via openclaw.khe.ee.
    build: .
    image: openclaw-custom:2026.4.15
    container_name: openclaw
    restart: unless-stopped
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    ports:
      - "18789:18789"
    volumes:
      - openclaw_config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace  # git-tracked, bind-mounted
    env_file:
      - .env
    environment:
      - TZ=Europe/Tallinn
      - DOCKER_HOST=tcp://docker-socket-proxy:2375  # routes docker CLI through proxy
      - GEMINI_API_KEY
      - TELEGRAM_BOT_TOKEN
    networks:
      - proxy
      - ai-internal
      - socket-proxy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.00'

volumes:
  openclaw_config:

networks:
  proxy:
    external: true
  ai-internal:
    external: true
  socket-proxy:
    internal: true  # no external traffic, only openclaw <-> socket-proxy
