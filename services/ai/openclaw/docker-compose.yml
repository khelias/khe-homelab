services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: openclaw-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Read-only Docker API access
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      VOLUMES: 1
      # Write operations: blocked except container restart/stop/start
      POST: 0
      ALLOW_RESTARTS: 1
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      TASKS: 0
      CONFIGS: 0
    networks:
      - socket-proxy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  openclaw:
    build: .
    image: openclaw-custom:2026.4.12
    container_name: openclaw
    restart: unless-stopped
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    ports:
      - "18789:18789"
    volumes:
      - openclaw_config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace  # git-tracked, bind-mounted
    env_file:
      - .env
    environment:
      - TZ=Europe/Tallinn
      - DOCKER_HOST=tcp://docker-socket-proxy:2375  # routes docker CLI through proxy
      - GEMINI_API_KEY
      - TELEGRAM_BOT_TOKEN
    networks:
      - proxy
      - ai-internal
      - socket-proxy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  openclaw_config:

networks:
  proxy:
    external: true
  ai-internal:
    external: true
  socket-proxy:
    internal: true  # no external traffic, only openclaw <-> socket-proxy
