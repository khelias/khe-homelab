services:
  ollama:
    image: ollama/ollama:0.20.6
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - TZ=Europe/Tallinn
      - OLLAMA_NUM_THREAD=8        # use all vCPUs explicitly
      - OLLAMA_KEEP_ALIVE=-1       # keep model loaded in RAM indefinitely
      - OLLAMA_FLASH_ATTENTION=1   # memory-efficient attention (Ollama v0.13.5+)
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-internal
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    # GPU passthrough (when available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

volumes:
  ollama_data:

networks:
  ai-internal:
    external: true
