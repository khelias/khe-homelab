services:
  ollama:
    image: ollama/ollama:0.30.8@sha256:05b6fe5143ed006d6d4abd39bdd575f962a5822bdf81e6fbb5e6894eb984ab9c
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - TZ=Europe/Tallinn
      - OLLAMA_NUM_THREAD=8        # use all vCPUs explicitly
      - OLLAMA_KEEP_ALIVE=-1       # keep model loaded in RAM indefinitely
      - OLLAMA_FLASH_ATTENTION=1   # memory-efficient attention (Ollama v0.13.5+)
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-internal
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 10G   # qwen2.5:7b ~5-6GB + overhead
          cpus: '6'     # leave 2 vCPUs for other services during inference
        # GPU passthrough (when available — uncomment and remove limits above):
        # reservations:
        #   devices:
        #     - capabilities: [gpu]

volumes:
  ollama_data:

networks:
  ai-internal:
    external: true
