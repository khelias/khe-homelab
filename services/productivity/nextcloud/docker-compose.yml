services:
  nextcloud:
    image: nextcloud:33.0.2-apache
    container_name: nextcloud
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - REDIS_HOST=nextcloud-redis
      - REDIS_HOST_PORT=6379
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_DOMAIN} nextcloud
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://${NEXTCLOUD_DOMAIN}
      - PHP_MEMORY_LIMIT=512M
      - PHP_UPLOAD_LIMIT=16G
      - TZ=Europe/Tallinn
    volumes:
      - nextcloud_html:/var/www/html
      - ${DATA_PATH}:/var/www/html/data
      - ./php-custom.ini:/usr/local/etc/php/conf.d/zzz-custom.ini:ro
    ports:
      - "8888:80"
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    networks:
      - proxy
      - nextcloud-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:80/status.php"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s

  nextcloud-cron:
    image: nextcloud:33.0.2-apache
    container_name: nextcloud-cron
    restart: unless-stopped
    entrypoint: /cron.sh
    environment:
      - TZ=Europe/Tallinn
    volumes:
      - nextcloud_html:/var/www/html
      - ${DATA_PATH}:/var/www/html/data
      - ./php-custom.ini:/usr/local/etc/php/conf.d/zzz-custom.ini:ro
    depends_on:
      nextcloud:
        condition: service_healthy
    networks:
      - nextcloud-internal

  nextcloud-db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_buffers=8MB
      - -c
      - random_page_cost=1.1
    shm_size: '512mb'
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_DB_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - TZ=Europe/Tallinn
    volumes:
      - nextcloud_pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nextcloud-internal

  nextcloud-redis:
    image: redis:8.6-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    environment:
      - TZ=Europe/Tallinn
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nextcloud-internal

volumes:
  nextcloud_html:
  nextcloud_pgdata:

networks:
  proxy:
    external: true
  nextcloud-internal:
    driver: bridge
