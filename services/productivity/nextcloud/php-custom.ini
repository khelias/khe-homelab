; Nextcloud production PHP overrides
; Loaded last (zzz- prefix in container mount)

; Upload limits — 16G for large video/photo files
; CF Tunnel has no file size limit (unlike CF Proxy free tier 100MB cap)
upload_max_filesize=16G
post_max_size=16G

; Memory
memory_limit=512M

; Execution time — allow long operations (large file uploads, cron tasks)
max_execution_time=3600
max_input_time=3600

; OPcache — tuned for Nextcloud 33
opcache.enable=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=10000
opcache.revalidate_freq=60
opcache.save_comments=1
opcache.jit=1255
opcache.jit_buffer_size=128M
