# All traffic arrives via Cloudflare Tunnel (TLS terminated there).
# Apache sees HTTP but the real connection is HTTPS.
# Rewrite Location headers in redirects (e.g. .well-known/caldav)
# from http:// to https:// so clients get the correct scheme.
<IfModule mod_headers.c>
    Header edit Location ^http:// https://
</IfModule>
