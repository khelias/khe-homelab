services:
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.14@sha256:b89f83345532cfba72690185257eb6c4f92fc2a782332a42abe19c07b7a6595f
    container_name: paperless
    restart: unless-stopped
    depends_on:
      paperless-db:
        condition: service_healthy
      paperless-redis:
        condition: service_healthy
    environment:
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_DBENGINE=postgresql
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBNAME=${POSTGRES_DB:-paperless}
      - PAPERLESS_DBUSER=${POSTGRES_USER:-paperless}
      - PAPERLESS_DBPASS=${POSTGRES_PASSWORD}
      - PAPERLESS_URL=https://${PAPERLESS_DOMAIN}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER:-admin}
      - PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD}
      - PAPERLESS_OCR_LANGUAGE=est+eng
      - PAPERLESS_OCR_LANGUAGES=est
      - PAPERLESS_TIME_ZONE=Europe/Tallinn
      - TZ=Europe/Tallinn
    volumes:
      - paperless_data:/usr/src/paperless/data
      - ${MEDIA_PATH}:/usr/src/paperless/media
      - ${CONSUME_PATH}:/usr/src/paperless/consume
      - ${EXPORT_PATH}:/usr/src/paperless/export
    ports:
      - "8010:8000"
    networks:
      - proxy
      - paperless-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.00'

  paperless-db:
    image: postgres:18-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
    container_name: paperless-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-paperless}
      - POSTGRES_USER=${POSTGRES_USER:-paperless}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=Europe/Tallinn
    volumes:
      - paperless_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperless}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - paperless-internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.00'

  paperless-redis:
    image: redis:8.6-alpine@sha256:c5e375abb885e6b2021c0377879e4890bf76f9065b8922ffc113f2b226b9fc17
    container_name: paperless-redis
    restart: unless-stopped
    # Celery broker + cache; no persistent volume mounted, so persistence is a
    # no-op anyway — disable it and cap memory to match nextcloud-redis pattern.
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    environment:
      - TZ=Europe/Tallinn
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - paperless-internal
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.50'

volumes:
  paperless_data:
  paperless_pgdata:

networks:
  proxy:
    external: true
  paperless-internal:
    driver: bridge
