services:
  jellyfin-init:
    image: busybox:1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
    container_name: jellyfin-init
    restart: no
    volumes:
      - jellyfin_config:/config
      - ./encoding.xml:/encoding.xml:ro
    command: >
      sh -c "mkdir -p /config/config &&
             if ! grep -q '<HardwareAccelerationType>qsv' /config/config/encoding.xml 2>/dev/null; then
               cp /encoding.xml /config/config/encoding.xml &&
               echo 'QSV encoding config written';
             else
               echo 'QSV encoding config already present, skipping';
             fi &&
             if grep -q '<EnableHwAcceleration>false' /config/config/system.xml 2>/dev/null; then
               sed -i 's|<EnableHwAcceleration>false</EnableHwAcceleration>|<EnableHwAcceleration>true</EnableHwAcceleration>|g' /config/config/system.xml &&
               sed -i 's|<EnableHwEncoding>false</EnableHwEncoding>|<EnableHwEncoding>true</EnableHwEncoding>|g' /config/config/system.xml &&
               echo 'Trickplay HW acceleration enabled';
             else
               echo 'Trickplay HW acceleration already enabled, skipping';
             fi"

  jellyfin:
    image: jellyfin/jellyfin:10.11.10@sha256:f66273e014b307e4ac46778845ebc1e9ee24b2e57c1fc17d5ec5ac3015649bfa
    container_name: jellyfin
    restart: unless-stopped
    depends_on:
      jellyfin-init:
        condition: service_completed_successfully
    environment:
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL}
      - LIBVA_DRIVER_NAME=iHD
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - ${MEDIA_PATH}:/media:ro
    ports:
      - "8096:8096"
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '3.00'

volumes:
  jellyfin_config:
  jellyfin_cache:

networks:
  proxy:
    external: true
