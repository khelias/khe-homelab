services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
    container_name: immich-server
    restart: unless-stopped
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - ./immich.config.json:/immich.config.json:ro
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME:-immich}
      - DB_HOSTNAME=immich-postgres
      - REDIS_HOSTNAME=immich-valkey
      - IMMICH_CONFIG_FILE=/immich.config.json
    ports:
      - "2283:2283"
    depends_on:
      immich-valkey:
        condition: service_healthy
      immich-postgres:
        condition: service_healthy
    networks:
      - proxy
      - immich-internal
    devices:
      - /dev/dri:/dev/dri
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2283/api/server/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5-openvino@sha256:71cd5a681823c4b818f4b24b3f05816eccc3d085559e7615f695bde77e64f1f2
    container_name: immich-machine-learning
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - immich_ml_cache:/cache
    networks:
      - immich-internal
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    healthcheck:
      # OpenVINO image ships without curl; use python3 (already present for the service)
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3003/ping').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # ML model loading takes time on first start

  immich-valkey:
    image: docker.io/valkey/valkey:9-alpine@sha256:e1095c6c76ee982cb2d1e07edbb7fb2a53606630a1d810d5a47c9f646b708bf5
    container_name: immich-valkey
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - immich-internal

  immich-postgres:
    image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4
    container_name: immich-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_DB=${DB_DATABASE_NAME:-immich}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - immich_pgdata:/var/lib/postgresql/data
    shm_size: 512mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_DATABASE_NAME:-immich} -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - immich-internal

volumes:
  immich_pgdata:
  immich_ml_cache:

networks:
  proxy:
    external: true
  immich-internal:
    driver: bridge
