services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.7.4
    container_name: immich-server
    restart: unless-stopped
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME:-immich}
      - DB_HOSTNAME=immich-postgres
      - REDIS_HOSTNAME=immich-valkey
    ports:
      - "2283:2283"
    depends_on:
      immich-valkey:
        condition: service_healthy
      immich-postgres:
        condition: service_healthy
    networks:
      - proxy
      - immich-internal
    # Intel Quick Sync hardware transcoding
    devices:
      - /dev/dri:/dev/dri

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.4
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - immich_ml_cache:/cache
    networks:
      - immich-internal

  immich-valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: immich-valkey
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - immich-internal

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_DB=${DB_DATABASE_NAME:-immich}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - immich_pgdata:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_DATABASE_NAME:-immich} -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - immich-internal

volumes:
  immich_pgdata:
  immich_ml_cache:

networks:
  proxy:
    external: true
  immich-internal:
    driver: bridge
