name: Runner Maintenance

on:
  schedule:
    - cron: '20 2 * * *'
  workflow_dispatch:
    inputs:
      aggressive:
        description: Remove all unused Docker images regardless of age
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: runner-maintenance
  cancel-in-progress: false

jobs:
  docker-cleanup:
    name: Docker cleanup
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Clean Docker cache and unused images
        env:
          DOCKER_CLEANUP_AGGRESSIVE: ${{ github.event.inputs.aggressive || 'false' }}
        run: ./scripts/docker-cleanup.sh
